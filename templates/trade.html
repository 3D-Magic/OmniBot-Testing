{% extends "base.html" %}
{% block content %}
<div class="header">
    <h2>🎯 Manual Trade</h2>
</div>

<div class="card">
    <h3>Place Order</h3>
    <div class="form-grid">
        <div>
            <label class="form-label">Broker</label>
            <select id="broker">
                <option value="alpaca">Alpaca</option>
                <option value="binance">Binance</option>
            </select>
        </div>
        <div>
            <label class="form-label">Symbol</label>
            <input type="text" id="symbol" placeholder="AAPL" value="AAPL">
        </div>
        <div>
            <label class="form-label">Side</label>
            <select id="side">
                <option value="buy">Buy</option>
                <option value="sell">Sell</option>
            </select>
        </div>
        <div>
            <label class="form-label">Quantity</label>
            <input type="number" id="qty" placeholder="1" value="1" step="0.01">
        </div>
    </div>
    <div style="margin-top: 16px;">
        <button class="btn btn-success" onclick="submitOrder()">📤 Submit Order</button>
    </div>
    <div id="orderResult" style="margin-top: 16px;"></div>
</div>

<script>
async function submitOrder() {
    const broker = document.getElementById('broker').value;
    const symbol = document.getElementById('symbol').value.toUpperCase();
    const side = document.getElementById('side').value;
    const qty = parseFloat(document.getElementById('qty').value);
    
    if (!symbol || qty <= 0) {
        document.getElementById('orderResult').innerHTML = '<span style="color: var(--accent-red);">Please enter valid symbol and quantity</span>';
        return;
    }
    
    try {
        const res = await fetch('/api/order/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({broker, symbol, qty, side, type: 'market'})
        });
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('orderResult').innerHTML = '<span style="color: var(--accent-green);">✅ Order submitted: ' + data.order_id + '</span>';
        } else {
            document.getElementById('orderResult').innerHTML = '<span style="color: var(--accent-red);">❌ Error: ' + (data.error || 'Unknown error') + '</span>';
        }
    } catch (e) {
        document.getElementById('orderResult').innerHTML = '<span style="color: var(--accent-red);">❌ Connection error</span>';
    }
}
</script>
{% endblock %}
