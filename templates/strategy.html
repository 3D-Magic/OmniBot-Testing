<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIBOT v2.7.2 - Strategy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-sidebar: #0d0d12;
            --bg-card: #15151c;
            --bg-card-hover: #1a1a22;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --accent-orange: #ffa502;
            --border-color: #1e1e28;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
        }
        
        .logo-text h1 {
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .logo-version {
            color: var(--text-secondary);
            font-size: 0.75em;
            margin-left: 52px;
            margin-bottom: 32px;
        }
        
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            color: var(--text-secondary);
            font-size: 0.65em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
        }
        
        .nav-item i {
            width: 18px;
            text-align: center;
        }
        
        .user-profile {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 0.9em;
            font-weight: 500;
        }
        
        .user-role {
            font-size: 0.75em;
            color: var(--text-secondary);
        }
        
        .logout-btn {
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            color: var(--accent-red);
            background: rgba(255, 71, 87, 0.1);
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header-title h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .header-title p {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        /* Current Strategy Banner */
        .current-strategy {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .current-strategy h3 {
            font-size: 0.8em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .current-strategy-name {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }
        
        .current-strategy-desc {
            color: var(--text-secondary);
            font-size: 0.95em;
        }
        
        /* Strategy Grid */
        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .strategy-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }
        
        .strategy-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .strategy-card.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.05);
        }
        
        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .strategy-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .strategy-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
        }
        
        .strategy-icon.scalping { background: rgba(255, 71, 87, 0.15); color: var(--accent-red); }
        .strategy-icon.day { background: rgba(255, 165, 2, 0.15); color: var(--accent-orange); }
        .strategy-icon.swing { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }
        .strategy-icon.momentum { background: rgba(255, 71, 87, 0.15); color: var(--accent-red); }
        .strategy-icon.reversion { background: rgba(255, 165, 2, 0.15); color: var(--accent-orange); }
        .strategy-icon.breakout { background: rgba(255, 71, 87, 0.15); color: var(--accent-red); }
        .strategy-icon.trend { background: rgba(255, 165, 2, 0.15); color: var(--accent-orange); }
        
        .strategy-title h4 {
            font-size: 1.1em;
        }
        
        .risk-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .risk-badge.low {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-green);
        }
        
        .risk-badge.medium {
            background: rgba(255, 165, 2, 0.15);
            color: var(--accent-orange);
        }
        
        .risk-badge.high {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
        }
        
        .strategy-description {
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .strategy-details {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .details-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        
        .detail-label {
            font-size: 0.7em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            font-size: 0.95em;
        }
        
        .detail-value.sl { color: var(--accent-red); }
        .detail-value.tp { color: var(--accent-green); }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent-cyan);
            color: #000;
        }
        
        .btn-primary:hover {
            background: #33ddff;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: var(--accent-green);
            color: #000;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        
        .alert.success {
            display: block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: var(--accent-green);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <div class="logo-text">
                <h1>OMNIBOT</h1>
            </div>
        </div>
        <div class="logo-version">v2.7.2 Titan</div>
        
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <a href="/" class="nav-item">
                <i>📊</i> Dashboard
            </a>
            <a href="/positions" class="nav-item">
                <i>💼</i> Positions
            </a>
            <a href="/orders" class="nav-item">
                <i>📋</i> Order History
            </a>
            <a href="/graphs" class="nav-item">
                <i>📈</i> Graphs
            </a>
        </div>
        
        <div class="nav-section">
            <div class="nav-section-title">Configuration</div>
            <a href="/settings" class="nav-item">
                <i>⚙️</i> Settings
            </a>
            <a href="/strategy" class="nav-item active">
                <i>🧠</i> Strategy
            </a>
        </div>
        
        <div class="nav-section">
            <div class="nav-section-title">System</div>
            <a href="/logs" class="nav-item">
                <i>⌨️</i> Logs
            </a>
            <a href="/login" class="nav-item">
                <i>❓</i> Help
            </a>
        </div>
        
        <div class="user-profile">
            <div class="user-avatar">👤</div>
            <div class="user-info">
                <div class="user-name">Admin</div>
                <div class="user-role">Trader</div>
            </div>
            <a href="/login" class="logout-btn">🚪</a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div class="header-title">
                <h2>Strategy</h2>
                <p>Select your trading approach</p>
            </div>
        </div>
        
        <div id="alert-container"></div>
        
        <!-- Current Strategy -->
        <div class="current-strategy">
            <h3>Currently Active</h3>
            <div class="current-strategy-name" id="current-name">Swing Trading</div>
            <div class="current-strategy-desc" id="current-desc">Multi-day holds capturing medium-term price movements</div>
        </div>
        
        <!-- Strategy Grid -->
        <div class="strategy-grid" id="strategy-grid">
            <!-- Strategies loaded by JS -->
        </div>
    </main>
    
    <script>
        const strategies = {
            scalping: {
                name: 'Scalping',
                icon: '⚡',
                iconClass: 'scalping',
                description: 'High-frequency short-term trades with small profit targets. Uses EMA crossovers (9/21) with RSI confirmation.',
                risk: 'high',
                timeframe: '1-5 min',
                indicators: 'EMA 9/21, RSI',
                stopLoss: '0.5%',
                takeProfit: '1%'
            },
            day_trading: {
                name: 'Day Trading',
                icon: '☀️',
                iconClass: 'day',
                description: 'Intraday trades closed before market close. Uses VWAP with Bollinger Bands for entry/exit signals.',
                risk: 'medium',
                timeframe: '5-15 min',
                indicators: 'VWAP, BB, RSI',
                stopLoss: '1.5%',
                takeProfit: '3%'
            },
            swing_trading: {
                name: 'Swing Trading',
                icon: '📈',
                iconClass: 'swing',
                description: 'Multi-day holds capturing medium-term price movements. Uses MACD with SMA trend confirmation.',
                risk: 'medium',
                timeframe: 'Daily',
                indicators: 'MACD, SMA 20/50',
                stopLoss: '4%',
                takeProfit: '8%'
            },
            momentum: {
                name: 'Momentum',
                icon: '🚀',
                iconClass: 'momentum',
                description: 'Ride strong price trends with volume confirmation. Uses Rate of Change (ROC) indicator.',
                risk: 'high',
                timeframe: 'Daily',
                indicators: 'ROC, Volume',
                stopLoss: '6%',
                takeProfit: '12%'
            },
            mean_reversion: {
                name: 'Mean Reversion',
                icon: '🔄',
                iconClass: 'reversion',
                description: 'Trade price reversions back to the mean. Uses Bollinger Bands for overbought/oversold signals.',
                risk: 'medium',
                timeframe: 'Daily',
                indicators: 'BB, RSI',
                stopLoss: '3%',
                takeProfit: '5%'
            },
            breakout: {
                name: 'Breakout',
                icon: '💥',
                iconClass: 'breakout',
                description: 'Trade breakouts from support/resistance levels. Identifies 20-day highs/lows with volume.',
                risk: 'high',
                timeframe: 'Daily',
                indicators: '20-day H/L, ATR',
                stopLoss: '5%',
                takeProfit: '15%'
            },
            trend_following: {
                name: 'Trend Following',
                icon: '📊',
                iconClass: 'trend',
                description: 'Follow established price trends using moving averages. Uses SMA 50/200 crossovers.',
                risk: 'medium',
                timeframe: 'Daily',
                indicators: 'SMA 50/200',
                stopLoss: '6%',
                takeProfit: '15%'
            }
        };
        
        let currentStrategy = 'swing_trading';
        
        function renderStrategies() {
            const grid = document.getElementById('strategy-grid');
            grid.innerHTML = '';
            
            for (const [key, s] of Object.entries(strategies)) {
                const isActive = key === currentStrategy;
                
                const card = document.createElement('div');
                card.className = `strategy-card ${isActive ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="strategy-header">
                        <div class="strategy-title">
                            <div class="strategy-icon ${s.iconClass}">${s.icon}</div>
                            <h4>${s.name}</h4>
                        </div>
                        <span class="risk-badge ${s.risk}">${s.risk} risk</span>
                    </div>
                    <p class="strategy-description">${s.description}</p>
                    <div class="strategy-details">
                        <div class="details-row">
                            <div class="detail-item">
                                <span class="detail-label">Timeframe</span>
                                <span class="detail-value">${s.timeframe}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Indicators</span>
                                <span class="detail-value">${s.indicators}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Stop Loss</span>
                                <span class="detail-value sl">${s.stopLoss}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Take Profit</span>
                                <span class="detail-value tp">${s.takeProfit}</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn ${isActive ? 'btn-success' : 'btn-primary'}" onclick="selectStrategy('${key}')">
                        ${isActive ? '✓ Active' : 'Select'}
                    </button>
                `;
                grid.appendChild(card);
            }
        }
        
        async function selectStrategy(key) {
            if (key === currentStrategy) return;
            
            try {
                const response = await fetch('/api/trading/strategy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({strategy: key})
                });
                
                const data = await response.json();
                if (data.success) {
                    currentStrategy = key;
                    const s = strategies[key];
                    document.getElementById('current-name').textContent = s.name;
                    document.getElementById('current-desc').textContent = s.description;
                    renderStrategies();
                    showAlert(`Strategy changed to ${s.name}`, 'success');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function loadCurrentStrategy() {
            try {
                const response = await fetch('/api/strategies');
                const data = await response.json();
                if (data.current_strategy) {
                    currentStrategy = data.current_strategy;
                    const s = strategies[currentStrategy];
                    if (s) {
                        document.getElementById('current-name').textContent = s.name;
                        document.getElementById('current-desc').textContent = s.description;
                    }
                }
            } catch (error) {
                console.error('Error loading strategy:', error);
            }
            renderStrategies();
        }
        
        function showAlert(msg, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert ${type}">${msg}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }
        
        document.addEventListener('DOMContentLoaded', loadCurrentStrategy);
    </script>
</body>
</html>
