<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}OMNIBOT v2.7.2{% endblock %}</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #151520;
            
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-success: #00ff88;
            --accent-danger: #ff4757;
            --accent-warning: #ffa502;
            
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7b;
            
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.15);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
            animation: slideInLeft 0.5s ease;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            animation: glow 3s infinite;
        }
        
        .logo-text h1 {
            font-size: 1.4em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text span {
            font-size: 0.7em;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .nav-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }
        
        .nav-section {
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease;
            animation-fill-mode: both;
        }
        
        .nav-section:nth-child(1) { animation-delay: 0.1s; }
        .nav-section:nth-child(2) { animation-delay: 0.2s; }
        .nav-section:nth-child(3) { animation-delay: 0.3s; }
        
        .nav-section-title {
            font-size: 0.65em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 0 12px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }
        
        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .nav-item:hover::before {
            transform: scaleY(1);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(124, 58, 237, 0.08));
            color: var(--accent-primary);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .nav-item.active::before {
            transform: scaleY(1);
        }
        
        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 1.05em;
        }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        
        .user-info:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .user-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .user-role {
            font-size: 0.75em;
            color: var(--text-muted);
        }
        
        /* Main Content */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            animation: fadeIn 0.5s ease;
        }
        .main-content::-webkit-scrollbar { display: none; }
        
        /* Top Header */
        .top-header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        
        .header-left h2 {
            font-size: 1.5em;
            font-weight: 600;
        }
        
        .header-left p {
            font-size: 0.85em;
            color: var(--text-muted);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: var(--bg-tertiary);
            border-radius: 24px;
            font-size: 0.85em;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: var(--accent-success);
            box-shadow: 0 0 10px var(--accent-success);
        }
        
        .status-dot.offline {
            background: var(--accent-danger);
            animation: none;
        }
        
        .status-dot.warning {
            background: var(--accent-warning);
            box-shadow: 0 0 10px var(--accent-warning);
        }
        
        .header-btn {
            width: 42px;
            height: 42px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
        }
        
        .header-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }
        
        /* Content Area */
        .content {
            padding: 32px;
            animation: fadeIn 0.5s ease;
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        
        .card:hover {
            border-color: rgba(0, 212, 255, 0.15);
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h3 {
            font-size: 1.05em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-header h3 i {
            color: var(--accent-primary);
            font-size: 1.1em;
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }
        
        .btn-success {
            background: var(--accent-success);
            color: var(--bg-primary);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
        }
        
        .btn-danger {
            background: var(--accent-danger);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85em;
        }
        
        /* Alerts */
        .alert {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: var(--accent-success);
        }
        
        .alert-error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: var(--accent-danger);
        }
        
        .alert-warning {
            background: rgba(255, 165, 2, 0.1);
            border: 1px solid rgba(255, 165, 2, 0.2);
            color: var(--accent-warning);
        }
        
        .alert-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--accent-primary);
        }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Selection */
        ::selection {
            background: rgba(0, 212, 255, 0.3);
            color: var(--text-primary);
        }
        
        /* Focus */
        *:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .top-header {
                padding: 12px 20px;
            }
            
            .header-left h2 {
                font-size: 1.2em;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    {% block extra_js %}{% endblock %}

<script>
(function(){
  if(document.getElementById('osk')) return;
  var kbd = document.createElement('div');
  kbd.id = 'osk';
  kbd.innerHTML = '<style>#osk{position:fixed;bottom:0;left:0;right:0;background:#0f0f1a;border-top:2px solid #333;padding:6px;z-index:99999;display:none}.osk-row{display:flex;justify-content:center;gap:3px;margin-bottom:3px}.osk-key{min-width:28px;height:42px;padding:0 8px;background:#2a2a3a;color:#fff;border:1px solid #444;border-radius:5px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}.osk-key:active{background:#00d4ff;color:#000;border-color:#00d4ff}.osk-key.w2{min-width:56px}.osk-key.w3{min-width:84px;flex:1;max-width:200px}.osk-key.sp{background:#3b3b5a}</style>'+
  '<div class="osk-row"><div class="osk-key" data-c="1">1</div><div class="osk-key" data-c="2">2</div><div class="osk-key" data-c="3">3</div><div class="osk-key" data-c="4">4</div><div class="osk-key" data-c="5">5</div><div class="osk-key" data-c="6">6</div><div class="osk-key" data-c="7">7</div><div class="osk-key" data-c="8">8</div><div class="osk-key" data-c="9">9</div><div class="osk-key" data-c="0">0</div></div>'+
  '<div class="osk-row"><div class="osk-key" data-c="q">q</div><div class="osk-key" data-c="w">w</div><div class="osk-key" data-c="e">e</div><div class="osk-key" data-c="r">r</div><div class="osk-key" data-c="t">t</div><div class="osk-key" data-c="y">y</div><div class="osk-key" data-c="u">u</div><div class="osk-key" data-c="i">i</div><div class="osk-key" data-c="o">o</div><div class="osk-key" data-c="p">p</div></div>'+
  '<div class="osk-row"><div class="osk-key" data-c="a">a</div><div class="osk-key" data-c="s">s</div><div class="osk-key" data-c="d">d</div><div class="osk-key" data-c="f">f</div><div class="osk-key" data-c="g">g</div><div class="osk-key" data-c="h">h</div><div class="osk-key" data-c="j">j</div><div class="osk-key" data-c="k">k</div><div class="osk-key" data-c="l">l</div></div>'+
  '<div class="osk-row"><div class="osk-key w2 sp" data-c="SHIFT">&#8679;</div><div class="osk-key" data-c="z">z</div><div class="osk-key" data-c="x">x</div><div class="osk-key" data-c="c">c</div><div class="osk-key" data-c="v">v</div><div class="osk-key" data-c="b">b</div><div class="osk-key" data-c="n">n</div><div class="osk-key" data-c="m">m</div><div class="osk-key w2 sp" data-c="DEL">&#9003;</div></div>'+
  '<div class="osk-row"><div class="osk-key w2 sp" data-c=".">.</div><div class="osk-key w3" data-c=" ">Space</div><div class="osk-key w2 sp" data-c="ENTER">Done</div></div>';
  document.body.appendChild(kbd);
  var target=null, shift=false, lowers='qwertyuiopasdfghjklzxcvbnm';
  function type(ch){ if(!target)return; var s=target.selectionStart,e=target.selectionEnd,v=target.value; target.value=v.slice(0,s)+ch+v.slice(e); target.selectionStart=target.selectionEnd=s+ch.length; target.dispatchEvent(new Event('input',{bubbles:true})); }
  function del(){ if(!target)return; var s=target.selectionStart,e=target.selectionEnd,v=target.value; if(s===e&&s>0){target.value=v.slice(0,s-1)+v.slice(e);target.selectionStart=target.selectionEnd=s-1;}else{target.value=v.slice(0,s)+v.slice(e);target.selectionStart=target.selectionEnd=s;} target.dispatchEvent(new Event('input',{bubbles:true})); }
  function update(){ document.querySelectorAll('.osk-key[data-c]').forEach(function(b){ var c=b.getAttribute('data-c'); if(c.length===1&&lowers.indexOf(c)!==-1) b.textContent=shift?c.toUpperCase():c; }); }
  kbd.addEventListener('click',function(ev){ ev.preventDefault(); ev.stopPropagation(); var btn=ev.target.closest('.osk-key'); if(!btn)return; var c=btn.getAttribute('data-c'); if(c==='SHIFT'){shift=!shift;update();return;} if(c==='DEL'){del();return;} if(c==='ENTER'){kbd.style.display='none';if(target)target.blur();return;} var out=c; if(c.length===1&&lowers.indexOf(c)!==-1) out=shift?c.toUpperCase():c; type(out); if(shift){shift=false;update();} });
  function show(el){ target=el; kbd.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'center'}); }
  function hide(){ kbd.style.display='none'; target=null; }
  document.querySelectorAll('input,textarea').forEach(function(el){ el.addEventListener('focus',function(){show(el);}); });
  document.addEventListener('click',function(e){ if(e.target.matches('input,textarea'))return; if(e.target.closest('#osk'))return; hide(); });
})();
</script>


<style>
#osk{position:fixed;bottom:0;left:0;right:0;background:#0f0f1a;border-top:2px solid #333;padding:6px;z-index:99999;display:none}
.osk-row{display:flex;justify-content:center;gap:3px;margin-bottom:3px}
.osk-key{min-width:28px;height:42px;padding:0 8px;background:#2a2a3a;color:#fff;border:1px solid #444;border-radius:5px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.osk-key:active,.osk-key.pressed{background:#00d4ff;color:#000;border-color:#00d4ff}
.osk-key.w2{min-width:56px}.osk-key.w3{min-width:84px;flex:1;max-width:200px}
.osk-key.sp{background:#3b3b5a}.osk-key.shift-on{background:#00d4ff;color:#000}
</style>
<div id="osk">
  <div class="osk-row"><div class="osk-key" data-c="1">1</div><div class="osk-key" data-c="2">2</div><div class="osk-key" data-c="3">3</div><div class="osk-key" data-c="4">4</div><div class="osk-key" data-c="5">5</div><div class="osk-key" data-c="6">6</div><div class="osk-key" data-c="7">7</div><div class="osk-key" data-c="8">8</div><div class="osk-key" data-c="9">9</div><div class="osk-key" data-c="0">0</div></div>
  <div class="osk-row"><div class="osk-key" data-c="q">q</div><div class="osk-key" data-c="w">w</div><div class="osk-key" data-c="e">e</div><div class="osk-key" data-c="r">r</div><div class="osk-key" data-c="t">t</div><div class="osk-key" data-c="y">y</div><div class="osk-key" data-c="u">u</div><div class="osk-key" data-c="i">i</div><div class="osk-key" data-c="o">o</div><div class="osk-key" data-c="p">p</div></div>
  <div class="osk-row"><div class="osk-key" data-c="a">a</div><div class="osk-key" data-c="s">s</div><div class="osk-key" data-c="d">d</div><div class="osk-key" data-c="f">f</div><div class="osk-key" data-c="g">g</div><div class="osk-key" data-c="h">h</div><div class="osk-key" data-c="j">j</div><div class="osk-key" data-c="k">k</div><div class="osk-key" data-c="l">l</div></div>
  <div class="osk-row"><div class="osk-key w2 sp" data-c="SHIFT">&#8679;</div><div class="osk-key" data-c="z">z</div><div class="osk-key" data-c="x">x</div><div class="osk-key" data-c="c">c</div><div class="osk-key" data-c="v">v</div><div class="osk-key" data-c="b">b</div><div class="osk-key" data-c="n">n</div><div class="osk-key" data-c="m">m</div><div class="osk-key w2 sp" data-c="DEL">&#9003;</div></div>
  <div class="osk-row"><div class="osk-key w2 sp" data-c=".">.</div><div class="osk-key w3" data-c=" ">Space</div><div class="osk-key w2 sp" data-c="ENTER">Done</div></div>
</div>
<script>
(function(){
  var kbd = document.getElementById('osk');
  if (!kbd) return;
  var target = null, shift = false;
  var lowers = 'qwertyuiopasdfghjklzxcvbnm';

  function type(ch){
    if (!target) return;
    var s = target.selectionStart, e = target.selectionEnd, v = target.value;
    if (s === null || e === null) {
      target.value = (target.value || '') + ch;
    } else {
      target.value = v.slice(0, s) + ch + v.slice(e);
      target.selectionStart = target.selectionEnd = s + ch.length;
    }
    target.dispatchEvent(new Event('input', {bubbles:true}));
    setTimeout(function(){ target.focus(); }, 0);
  }

  function del(){
    if (!target) return;
    var s = target.selectionStart, e = target.selectionEnd, v = target.value;
    if (s === null || e === null) {
      target.value = (target.value || '').slice(0, -1);
    } else if (s === e && s > 0) {
      target.value = v.slice(0, s-1) + v.slice(e);
      target.selectionStart = target.selectionEnd = s-1;
    } else {
      target.value = v.slice(0, s) + v.slice(e);
      target.selectionStart = target.selectionEnd = s;
    }
    target.dispatchEvent(new Event('input', {bubbles:true}));
    setTimeout(function(){ target.focus(); }, 0);
  }

  function update(){
    document.querySelectorAll('.osk-key[data-c]').forEach(function(b){
      var c = b.getAttribute('data-c');
      if (c.length === 1 && lowers.indexOf(c) !== -1) b.textContent = shift ? c.toUpperCase() : c;
    });
    var sb = document.querySelector('.osk-key[data-c="SHIFT"]');
    if (sb) sb.classList.toggle('shift-on', shift);
  }

  function pressKey(btn){
    if (!btn) return;
    btn.classList.add('pressed');
    var c = btn.getAttribute('data-c');
    if (c === 'SHIFT') { shift = !shift; update(); return; }
    if (c === 'DEL') { del(); return; }
    if (c === 'ENTER') { kbd.style.display = 'none'; if (target) target.blur(); return; }
    var out = c;
    if (c.length === 1 && lowers.indexOf(c) !== -1) out = shift ? c.toUpperCase() : c;
    type(out);
    if (shift) { shift = false; update(); }
  }

  function releaseKey(btn){
    if (btn) btn.classList.remove('pressed');
  }

  // Touch devices: touchstart preventDefault suppresses synthetic click/mousedown
  kbd.addEventListener('touchstart', function(ev){
    ev.preventDefault();
    ev.stopPropagation();
    pressKey(ev.target.closest('.osk-key'));
  }, {passive: false});

  kbd.addEventListener('touchend', function(ev){
    ev.preventDefault();
    releaseKey(ev.target.closest('.osk-key'));
  }, {passive: false});

  kbd.addEventListener('touchcancel', function(ev){
    releaseKey(ev.target.closest('.osk-key'));
  });

  // Mouse fallback (only fires if no touch support)
  kbd.addEventListener('mousedown', function(ev){
    ev.preventDefault();
    ev.stopPropagation();
    pressKey(ev.target.closest('.osk-key'));
  });

  kbd.addEventListener('mouseup', function(ev){
    releaseKey(ev.target.closest('.osk-key'));
  });

  kbd.addEventListener('mouseleave', function(ev){
    releaseKey(ev.target.closest('.osk-key'));
  });

  function show(el){
    target = el;
    kbd.style.display = 'block';
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
  function hide(){
    kbd.style.display = 'none';
    target = null;
  }

  document.querySelectorAll('input, textarea').forEach(function(el){
    el.addEventListener('focus', function(){ show(el); });
  });

  document.addEventListener('click', function(e){
    if (e.target.matches('input, textarea')) return;
    if (e.target.closest('#osk')) return;
    hide();
  });
})();
</script>

</body>
</html>
