<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIBOT v2.7 Titan - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6b6b8f;
            margin-bottom: 2rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 1rem;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            color: #e0e0ff;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #00d4ff;
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #0099cc;
        }
        .error {
            color: #ff4757;
            margin-top: 1rem;
        }
        .hint {
            color: #6b6b8f;
            font-size: 0.875rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🤖 OMNIBOT</div>
        <div class="subtitle">v2.7 Titan - Multi-Market Trading Bot</div>
        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
        </form>
        <div class="hint">Default password: admin</div>
    </div>
</body>
</html>
